trigger:
  branches:
    include:
      - main

variables:
  azureServiceConnection: "sc-azure-mini3tier"

  location: "southeastasia"
  resourceGroup: "rg-mini3tier-simple"

  acrName: "acrmini3tiervan001"

  aksName: "aks-mini3tier-simple"

  backendImageName: "backend"
  frontendImageName: "frontend"

  imageTag: "$(Build.BuildId)"
  namespace: "mini3tier"

stages:
  - stage: Infra
    displayName: "Deploy infrastructure by Bicep"
    jobs:
      - job: DeployInfra
        pool:
          vmImage: "ubuntu-latest"

        steps:
          - task: AzureCLI@2
            displayName: "Create AKS and ACR"
            inputs:
              azureSubscription: "$(azureServiceConnection)"
              scriptType: "bash"
              scriptLocation: "inlineScript"
              inlineScript: |
                set -e

                az group create \
                  --name "$(resourceGroup)" \
                  --location "$(location)"

                az deployment group create \
                  --resource-group "$(resourceGroup)" \
                  --template-file infra/main.bicep \
                  --parameters \
                    location="$(location)" \
                    acrName="$(acrName)" \
                    aksName="$(aksName)"

                az aks update \
                  --resource-group "$(resourceGroup)" \
                  --name "$(aksName)" \
                  --attach-acr "$(acrName)"

  - stage: Build
    displayName: "Build and push images"
    dependsOn: Infra
    jobs:
      - job: BuildImages
        pool:
          vmImage: "ubuntu-latest"

        steps:
          - task: AzureCLI@2
            displayName: "Login to ACR"
            inputs:
              azureSubscription: "$(azureServiceConnection)"
              scriptType: "bash"
              scriptLocation: "inlineScript"
              inlineScript: |
                set -e
                az acr login --name "$(acrName)"

          - task: AzureCLI@2
            displayName: "Build and push Docker images"
            inputs:
              azureSubscription: "$(azureServiceConnection)"
              scriptType: "bash"
              scriptLocation: "inlineScript"
              inlineScript: |
                set -e

                ACR_LOGIN_SERVER=$(az acr show \
                  --name "$(acrName)" \
                  --resource-group "$(resourceGroup)" \
                  --query loginServer \
                  --output tsv)

                docker build \
                  --target development \
                  -t "$ACR_LOGIN_SERVER/$(backendImageName):$(imageTag)" \
                  -f backend/Dockerfile \
                  react-express-mysql/backend

                docker build \
                  --target development \
                  -t "$ACR_LOGIN_SERVER/$(frontendImageName):$(imageTag)" \
                  -f frontend/Dockerfile \
                  react-express-mysql/frontend

                docker push "$ACR_LOGIN_SERVER/$(backendImageName):$(imageTag)"
                docker push "$ACR_LOGIN_SERVER/$(frontendImageName):$(imageTag)"

  - stage: Deploy
    displayName: "Deploy to AKS"
    dependsOn: Build
    jobs:
      - job: DeployToAKS
        pool:
          vmImage: "ubuntu-latest"

        steps:
          - task: AzureCLI@2
            displayName: "Deploy Kubernetes manifests"
            inputs:
              azureSubscription: "$(azureServiceConnection)"
              scriptType: "bash"
              scriptLocation: "inlineScript"
              inlineScript: |
                set -e

                ACR_LOGIN_SERVER=$(az acr show \
                  --name "$(acrName)" \
                  --resource-group "$(resourceGroup)" \
                  --query loginServer \
                  --output tsv)

                az aks get-credentials \
                  --resource-group "$(resourceGroup)" \
                  --name "$(aksName)" \
                  --admin \
                  --overwrite-existing

                kubectl create namespace "$(namespace)" \
                  --dry-run=client \
                  -o yaml | kubectl apply -f -

                kubectl create secret generic db-password \
                  --namespace "$(namespace)" \
                  --from-literal=db-password="$(DB_PASSWORD)" \
                  --dry-run=client \
                  -o yaml | kubectl apply -f -

                mkdir -p rendered

                sed \
                  -e "s|__ACR_LOGIN_SERVER__|$ACR_LOGIN_SERVER|g" \
                  -e "s|__IMAGE_TAG__|$(imageTag)|g" \
                  k8s/app.yaml > rendered/app.yaml

                kubectl apply -f rendered/app.yaml

                kubectl rollout status deployment/backend \
                  --namespace "$(namespace)" \
                  --timeout=180s

                kubectl rollout status deployment/frontend \
                  --namespace "$(namespace)" \
                  --timeout=180s

                kubectl get pods,svc \
                  --namespace "$(namespace)"
