apiVersion: v1
kind: Namespace
metadata:
  name: mini3tier

---
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: mini3tier
spec:
  type: ClusterIP
  selector:
    app: db
  ports:
    - port: 3306
      targetPort: 3306

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db
  namespace: mini3tier
spec:
  serviceName: db
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
        - name: db
          image: mariadb:10.6.4-focal
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_DATABASE
              value: example
            - name: MYSQL_ROOT_PASSWORD_FILE
              value: /run/secrets/db-password
          volumeMounts:
            - name: db-password
              mountPath: /run/secrets
              readOnly: true
            - name: db-data
              mountPath: /var/lib/mysql
      volumes:
        - name: db-password
          secret:
            secretName: db-password
  volumeClaimTemplates:
    - metadata:
        name: db-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: mini3tier
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - port: 80
      targetPort: 80

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: mini3tier
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: __ACR_LOGIN_SERVER__/backend:__IMAGE_TAG__
          ports:
            - containerPort: 80
          env:
            - name: DATABASE_DB
              value: example
            - name: DATABASE_USER
              value: root
            - name: DATABASE_PASSWORD
              value: /run/secrets/db-password
            - name: DATABASE_HOST
              value: db
            - name: NODE_ENV
              value: production
          volumeMounts:
            - name: db-password
              mountPath: /run/secrets
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 20
      volumes:
        - name: db-password
          secret:
            secretName: db-password

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: mini3tier
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 3000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: mini3tier
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: __ACR_LOGIN_SERVER__/frontend:__IMAGE_TAG__
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
